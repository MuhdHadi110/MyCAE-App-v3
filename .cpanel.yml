---
deployment:
  tasks:
    # Set paths for mycaec78 / app.mycae.co
    - export DEPLOYPATH=/home/mycaec78/public_html/
    - export REPO_PATH=/home/mycaec78/repositories/MyCAE-App
    
    # Build and deploy frontend
    - cd $REPO_PATH
    - npm ci --production=false
    - npm run build
    - /bin/cp -R dist/* $DEPLOYPATH
    
    # Build backend
    - cd $REPO_PATH/backend
    - npm ci --production=false
    - npm run build
    
    # Copy backend files - force update
    - export BACKENDPATH=/home/mycaec78/mycaetracker-backend/
    - /bin/mkdir -p $BACKENDPATH
    - /bin/rm -rf $BACKENDPATH/dist
    - /bin/cp -R $REPO_PATH/backend/dist $BACKENDPATH
    - /bin/cp -f $REPO_PATH/backend/package.json $BACKENDPATH
    - /bin/cp -f $REPO_PATH/backend/package-lock.json $BACKENDPATH
    - if [ ! -f $BACKENDPATH.env ]; then /bin/cp $REPO_PATH/backend/.env.example $BACKENDPATH.env; fi
    - echo "Deployed at $(date)" >> $BACKENDPATH/deploy.log
